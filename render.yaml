# Blueprint de Render para el backend (Express).
# En Render: New + → Blueprint → conecta el repo → detecta este archivo.
# Luego completa las variables marcadas (no se suben por seguridad).
services:
  - type: web
    name: mmm-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w backend
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: us-west-2
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
